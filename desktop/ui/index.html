<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeLab</title>
<style>
  :root {
    --bg: rgba(20, 22, 28, 0.92);
    --fg: #e8eaed;
    --dim: #9aa0a6;
    --up: #ef5350;
    --down: #42a5f5;
    --line: rgba(255,255,255,0.06);
    --accent: #3a82f7;
  }
  * { box-sizing: border-box; }
  /* 클릭 시 포커스 outline 제거 (위젯엔 키보드 nav 의미 약함) */
  *:focus { outline: none; }
  *:focus-visible { outline: none; }
  button, input, select { outline: none; }
  button::-moz-focus-inner { border: 0; }
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
  body {
    font: 11px -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    color: var(--fg);
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }
  .frame {
    height: 100vh;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .titlebar {
    height: 28px;
    background: rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    padding: 0 6px;
    gap: 2px;
    flex-shrink: 0;
  }
  .drag {
    flex: 1; height: 100%; -webkit-app-region: drag; cursor: move;
    display: flex; align-items: center; padding-left: 4px;
    min-width: 0;
  }
  .title { font-size: 11px; color: var(--dim); }
  .titlebar button {
    -webkit-app-region: no-drag;
    background: transparent;
    border: 0;
    color: var(--dim);
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .titlebar button:hover { background: rgba(255,255,255,0.08); color: var(--fg); }
  .titlebar button.active { color: var(--accent); }

  /* 모드 토글 칩 */
  .mode-toggle {
    -webkit-app-region: no-drag;
    display: flex;
    background: rgba(255,255,255,0.04);
    border-radius: 999px;
    padding: 2px;
    gap: 0;
    height: 20px;
    align-items: center;
    flex-shrink: 0;
  }
  .mode-toggle button {
    width: auto !important;
    height: 16px !important;
    padding: 0 8px !important;
    border-radius: 999px !important;
    font-size: 10px !important;
    color: var(--dim);
    background: transparent;
  }
  .mode-toggle button.on {
    background: rgba(58,130,247,0.18);
    color: var(--accent);
  }
  .mode-toggle button:hover { background: rgba(255,255,255,0.06); }
  .mode-toggle button.on:hover { background: rgba(58,130,247,0.25); }
  .body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 6px;
    min-height: 0;
  }
  .body::-webkit-scrollbar { width: 4px; }
  .body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* 행 */
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px;
    border-bottom: 1px solid var(--line);
    gap: 6px;
    cursor: grab;
    border-radius: 4px;
    transition: background 0.1s;
  }
  .row:hover { background: rgba(255,255,255,0.03); }
  .row:active { cursor: grabbing; }
  .row:last-child { border-bottom: 0; }
  .row.dragging { opacity: 0.4; }
  .row.drag-over { background: rgba(58,130,247,0.15); }
  .left { min-width: 0; flex: 1; }
  .name {
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }
  .ticker { font-size: 9px; color: var(--dim); }
  .session-badge {
    display: inline-block;
    margin-left: 4px;
    padding: 0 4px;
    border-radius: 3px;
    font-size: 8px;
    line-height: 12px;
    background: rgba(255,255,255,0.08);
    color: var(--dim);
    vertical-align: middle;
  }
  .session-badge.live { background: rgba(58,130,247,0.18); color: var(--accent); }
  .right { text-align: right; flex-shrink: 0; }
  .price { font-variant-numeric: tabular-nums; font-size: 11px; }
  .pct { font-size: 9px; font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }

  /* 푸터 — 새로고침 컨트롤 */
  .footer {
    background: rgba(0,0,0,0.25);
    padding: 4px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    font-size: 10px;
    flex-shrink: 0;
    height: 26px;
  }
  .footer .live-toggle {
    -webkit-app-region: no-drag;
    background: rgba(255,255,255,0.06);
    border: 1px solid transparent;
    color: var(--dim);
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    height: 18px;
    line-height: 1;
    display: flex; align-items: center; gap: 4px;
  }
  .footer .live-toggle.on { background: rgba(58,130,247,0.15); color: var(--accent); border-color: rgba(58,130,247,0.4); }
  .footer .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }
  .footer .live-toggle.on .dot { opacity: 1; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .footer input[type=number] {
    width: 38px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    color: var(--fg);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 10px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .footer input[type=number]:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255,255,255,0.07);
  }
  .footer input[type=number]::-webkit-inner-spin-button,
  .footer input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .footer .spacer { flex: 1; }
  .footer .ts { font-variant-numeric: tabular-nums; }
  .footer .cd { font-variant-numeric: tabular-nums; min-width: 22px; text-align: right; }
  .footer .open-web {
    -webkit-app-region: no-drag;
    background: transparent;
    border: 0;
    color: var(--dim);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, background 0.1s;
  }
  .footer .open-web:hover { color: var(--fg); background: rgba(255,255,255,0.06); }
  .footer .open-web svg { width: 11px; height: 11px; display: block; }
  .footer .open-web:disabled { opacity: 0.4; cursor: default; }

  /* 빈 상태 */
  .empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    line-height: 1.5;
  }

  /* 자산 뷰 — 섹션 */
  .sec-title {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 6px 1px;
    font-weight: 600;
  }
  .sec-title.collapsible {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
  }
  .sec-title.collapsible:hover { color: var(--fg); }
  .sec-title .arrow {
    display: inline-block;
    transition: transform 0.15s;
    font-size: 7px;
    line-height: 1;
  }
  .sec-title.collapsed .arrow { transform: rotate(-90deg); }
  .sec-title .bulk-toggle {
    margin-left: auto;
    background: rgba(255,255,255,0.04);
    border: 0;
    color: var(--dim);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: none;
    letter-spacing: 0;
  }
  .sec-title .bulk-toggle:hover { background: rgba(255,255,255,0.10); color: var(--fg); }

  /* 히어로 — 박스 없이, 통화별 원금/현재 */
  .hero-card { padding: 3px 6px; }
  .hero-block { padding: 1px 0; }
  .hero-block + .hero-block {
    border-top: 1px solid var(--line);
    margin-top: 4px;
    padding-top: 4px;
  }
  .hero-ccy-label {
    font-size: 9px;
    color: var(--dim);
    font-weight: 600;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .hero-row {
    display: flex;
    align-items: baseline;
    padding: 0;
    flex-wrap: nowrap;
    overflow: hidden;
    white-space: nowrap;
    min-width: 0;
  }
  .hero-row .hero-label {
    width: 26px;
    flex-shrink: 0;
    font-size: 9px;
    color: var(--dim);
  }
  .hero-row .hero-pct {
    margin-left: auto;
    margin-right: 4px;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    text-align: right;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .hero-row .hero-val {
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  /* 섹션 구분선 — 일반 (얇음) */
  .sec-divider {
    border: 0;
    border-top: 1px solid var(--line);
    margin: 4px 6px 0;
  }
  /* 섹션 구분선 — strong (히어로/섹션 사이, 진하게) */
  .sec-divider.strong {
    border-top: 1px solid rgba(255,255,255,0.18);
    margin: 6px 0 0;
  }

  /* 보유 종목 row — 클릭하면 show/hide 토글 */
  .hrow {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 3px 6px;
    border-bottom: 1px solid var(--line);
    gap: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .hrow:hover { background: rgba(255,255,255,0.04); }
  .hrow.busy { opacity: 0.5; cursor: wait; }
  .hrow:last-child { border-bottom: 0; }
  .hrow .hleft { min-width: 0; }
  .hrow .hname {
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 11px;
  }
  .hrow .hsub { font-size: 8px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .hrow .hright { text-align: right; }
  .hrow .hval { font-variant-numeric: tabular-nums; font-size: 10px; }
  .hrow .hpct { font-size: 9px; font-variant-numeric: tabular-nums; }
  .hrow.hidden-row { opacity: 0.42; }
  .hrow.hidden-row .hname { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.20); }

  /* 통화/계좌 미니 카드 */
  .mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
    padding: 0 6px;
  }
  .mini-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 4px 6px;
  }
  .mini-label { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px; }
  .mini-val { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-pct { font-size: 9px; font-variant-numeric: tabular-nums; margin-top: 1px; }

  /* 매우 작아질 때 — 타이틀바만 남는 모드 자동 (body 가 0이 되면 자연스럽게) */
  .frame.compact .body { display: none; }
  .frame.compact .footer { display: none; }
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="titlebar">
    <div class="drag"><span class="title" id="title">TradeLab</span></div>
    <div class="mode-toggle">
      <button id="mode-watch" class="on">관심</button>
      <button id="mode-my">자산</button>
    </div>
    <button id="btn-refresh" title="새로고침">↻</button>
    <button id="btn-pin" class="active" title="항상 위">📌</button>
    <button id="btn-settings" title="설정">⚙</button>
    <button id="btn-hide" title="숨기기">─</button>
  </div>
  <div class="body" id="body">
    <div class="empty">로딩...</div>
  </div>
  <div class="footer">
    <button id="live-toggle" class="live-toggle"><span class="dot"></span><span id="live-label">OFF</span></button>
    <input type="number" id="interval" min="3" max="300" value="5" title="새로고침 주기 (초)">
    <span class="cd" id="cd">--</span>
    <span class="spacer"></span>
    <span class="ts" id="status">--:--</span>
    <button id="btn-open-web" class="open-web" title="서버 페이지 열기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </button>
  </div>
</div>

<script type="module">
import { getCurrentWindow } from "https://esm.sh/@tauri-apps/api@2/window";
import { WebviewWindow } from "https://esm.sh/@tauri-apps/api@2/webviewWindow";
import { fetch as tFetch } from "https://esm.sh/@tauri-apps/plugin-http@2";
import { LazyStore } from "https://esm.sh/@tauri-apps/plugin-store@2";
import { listen } from "https://esm.sh/@tauri-apps/api@2/event";
import { openUrl } from "https://esm.sh/@tauri-apps/plugin-opener@2";

const store = new LazyStore("settings.json");
const win = getCurrentWindow();
const $ = (id) => document.getElementById(id);

let currentItems = [];
let lastData = null;
let mode = "watch";        // "watch" | "my"
let myOpts = { hero: true, totalBasis: false, realized: false, holdings: true, closed: false };
let collapsed = { holdings: false, closed: false };
let pinned = true;
let liveOn = false;
let liveTimer = null;
let liveNextAt = 0;
let intervalSec = 5;
let editingInterval = false;

async function _loadBool(key, def) {
  const v = await store.get(key);
  return v === undefined || v === null ? def : !!v;
}

function applyZoom(z) {
  const v = Math.max(0.5, Math.min(2.0, Number(z) || 1.0));
  // Chromium webview — body.style.zoom 으로 위젯 전체 확대/축소
  document.body.style.zoom = String(v);
}

async function loadCfg() {
  const base = (await store.get("base_url")) || "";
  const user = (await store.get("user")) || "";
  const pw = (await store.get("pw")) || "";
  const live = (await store.get("live_on"));
  const sec = Number(await store.get("interval")) || 5;
  const savedMode = (await store.get("mode")) || "watch";
  const zoom = Number(await store.get("widget_zoom")) || 1.0;
  intervalSec = Math.max(3, Math.min(300, sec));
  liveOn = live === true;
  mode = (savedMode === "my") ? "my" : "watch";
  applyZoom(zoom);
  myOpts.hero       = await _loadBool("my_show_hero", true);
  myOpts.totalBasis = await _loadBool("my_total_basis", false);
  myOpts.realized   = await _loadBool("my_show_realized", false);
  myOpts.holdings   = await _loadBool("my_show_holdings", true);
  myOpts.closed     = await _loadBool("my_show_closed", false);
  collapsed.holdings  = await _loadBool("my_collapse_holdings", false);
  collapsed.closed    = await _loadBool("my_collapse_closed", false);
  $("interval").value = intervalSec;
  updateLiveBtn();
  updateModeBtn();
  return { base, user, pw };
}

function updateModeBtn() {
  $("mode-watch").classList.toggle("on", mode === "watch");
  $("mode-my").classList.toggle("on", mode === "my");
}

async function saveLiveCfg() {
  await store.set("live_on", liveOn);
  await store.set("interval", intervalSec);
  await store.save();
}

function updateLiveBtn() {
  const btn = $("live-toggle");
  btn.classList.toggle("on", liveOn);
  $("live-label").textContent = liveOn ? "LIVE" : "OFF";
  $("cd").textContent = liveOn ? "--" : "";
}

function fmtPrice(market, price, currency) {
  const n = Number(price || 0);
  if (market === "kr_stock") return n.toLocaleString("ko-KR") + "원";
  if (market === "us_stock") return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 2 });
  if (currency === "USD") return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 2 });
  return n.toLocaleString("ko-KR") + "원";
}

function fmtPct(p) {
  const n = Number(p || 0);
  return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
}

function pctClass(p) {
  const n = Number(p || 0);
  if (n > 0) return "up";
  if (n < 0) return "down";
  return "";
}

function escape_(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderWatch(items) {
  currentItems = items || [];
  const body = $("body");
  if (currentItems.length === 0) {
    body.innerHTML = '<div class="empty">관심종목 없음<br><span style="font-size:10px">⚙ 에서 서버/계정 입력</span></div>';
    return;
  }
  body.innerHTML = currentItems.map(w => {
    let badge = "";
    if ((w.market === "kr_stock" || w.market === "us_stock") && w.session_label) {
      const liveSessions = [
        "pre_market", "regular", "after_market",
        "us_pre_market", "us_regular", "us_after_market",
      ];
      const isLive = liveSessions.includes(w.session);
      badge = `<span class="session-badge${isLive ? " live" : ""}">${escape_(w.session_label)}</span>`;
    }
    return `
    <div class="row" draggable="true" data-id="${w.id}">
      <div class="left">
        <div class="name">${escape_(w.ticker_name || w.ticker)}</div>
        <div class="ticker">${escape_(w.ticker)}${badge}</div>
      </div>
      <div class="right">
        <div class="price">${fmtPrice(w.market, w.price, w.currency)}</div>
        <div class="pct ${pctClass(w.change_pct)}">${fmtPct(w.change_pct)}</div>
      </div>
    </div>
  `;
  }).join("");
  attachDnD();
}

function fmtMoney(n, ccy) {
  const v = Math.round(Number(n || 0));
  if (ccy === "KRW") return v.toLocaleString("ko-KR") + "원";
  if (ccy === "USD") return "$" + v.toLocaleString("en-US");
  return v.toLocaleString();
}

function curOf(market, holdingCcy) {
  // 보유 종목 기본 통화 추정 (응답에 ccy 가 없을 때)
  if (holdingCcy) return holdingCcy;
  if (market === "kr_stock") return "KRW";
  if (market === "us_stock") return "USD";
  return "KRW";
}

function _collapsibleHeader(key, title, allHidden) {
  const isC = !!collapsed[key];
  // allHidden: true=모두 숨김상태(=>'전체 표시' 버튼), false=하나라도 보임(=>'전체 숨김')
  const bulkLabel = allHidden ? "표시" : "숨김";
  const bulkHidden = !allHidden;  // 클릭 시 적용할 hidden 값
  return `<div class="sec-title collapsible ${isC ? 'collapsed' : ''}" data-section="${key}">
    <span class="arrow">▼</span><span>${escape_(title)}</span>
    <button class="bulk-toggle" data-bulk-section="${key}" data-bulk-hidden="${bulkHidden}" title="이 섹션 전체 ${bulkLabel}">전체 ${bulkLabel}</button>
  </div>`;
}

function _sortHoldings(arr, key) {
  // hidden 은 항상 맨 아래, 그 안에서는 평가금액(또는 실현손익) 내림차순
  return arr.slice().sort((a, b) => {
    const aH = a.is_hidden ? 1 : 0;
    const bH = b.is_hidden ? 1 : 0;
    if (aH !== bH) return aH - bH;
    return (Number(b[key]) || 0) - (Number(a[key]) || 0);
  });
}

function _ccyOf(h) {
  // holdings/closed 응답엔 currency 가 직접 안 박혀 있을 수 있음 (closed 는 있음).
  // 보유 종목은 account_id 기준으로 by_account 에서 통화 lookup
  if (h.currency) return h.currency;
  return "KRW"; // 폴백
}

function _ccyAggFromArrays(holdings, closed, byAccount, opts) {
  // 옵션에 따라 통화별 cost / eval / unrealized / realized 다시 합산
  // - opts.holdings OFF → 보유 종목 데이터 제외
  // - opts.closed OFF → 닫힌 포지션 데이터 + 보유 종목의 realized_pnl 제외 (= 모든 실현손익 빼기)
  const acc2ccy = {};
  Object.keys(byAccount || {}).forEach(id => {
    acc2ccy[id] = (byAccount[id] || {}).currency || "KRW";
  });
  const out = {};
  function ensure(c) {
    if (!out[c]) out[c] = { cost: 0, eval: 0, unrealized: 0, realized: 0 };
    return out[c];
  }
  if (opts.holdings) {
    (holdings || []).forEach(h => {
      if (h.is_hidden) return;
      const c = acc2ccy[h.account_id] || "KRW";
      const a = ensure(c);
      a.cost += h.cost_amount || 0;
      a.eval += h.eval_amount || 0;
      a.unrealized += h.unrealized_pnl || 0;
      if (opts.closed) a.realized += h.realized_pnl || 0;
    });
  }
  if (opts.closed) {
    (closed || []).forEach(h => {
      if (h.is_hidden) return;
      const c = h.currency || acc2ccy[h.account_id] || "KRW";
      ensure(c).realized += h.realized_pnl || 0;
    });
  }
  return out;
}

function renderMy(data) {
  const body = $("body");
  data = data || {};
  const holdings = _sortHoldings(data.holdings || [], "eval_amount");
  const closed = _sortHoldings(data.closed_holdings || [], "realized_pnl");
  // hero 계산용 by_currency — 옵션에 따라 동적으로 다시 합산
  const byCcy = _ccyAggFromArrays(data.holdings || [], data.closed_holdings || [], data.by_account || {}, myOpts);
  // peak_invested 같은 누적 기준 데이터는 서버의 by_currency 에서 가져옴 (옵션 영향 X)
  const serverByCcy = data.by_currency || {};

  const sections = [];
  let lastWasHero = false;

  if (myOpts.hero) {
    // 통화 키는 서버 응답 기준 (옵션 OFF 라 byCcy 가 비어도 통화별 0/0/0 표시)
    const ccyKeys = Object.keys(serverByCcy);
    const dataAny = myOpts.holdings || myOpts.closed;
    if (ccyKeys.length === 0) {
      sections.push(`<div class="hero-card"><div class="hero-block"><div class="hero-ccy-label">자산</div><div class="hero-row"><span class="hero-label" style="color:var(--dim)">보유 없음</span></div></div></div>`);
    } else {
      sections.push(`<div class="hero-card">${ccyKeys.map(c => {
        const a = byCcy[c] || { cost: 0, eval: 0, unrealized: 0, realized: 0 };
        const realized = a.realized || 0;

        let principal, current, pnl, pnlLabel;
        if (myOpts.totalBasis) {
          // 총 누적 기준 — peak_invested. 두 옵션 다 OFF 면 표시 의미 없으니 0.
          principal = dataAny ? ((serverByCcy[c] || {}).peak_invested || 0) : 0;
          pnl       = (a.unrealized || 0) + (a.realized || 0);
          current   = principal + pnl;
          pnlLabel  = "누적손익";
        } else {
          // 보유분 기준
          principal = a.cost || 0;
          current   = a.eval || 0;
          pnl       = a.unrealized || 0;
          pnlLabel  = "미실현";
        }
        const pct = principal > 0 ? (pnl / principal * 100) : 0;
        const cls = pctClass(pnl);
        const sign = pct >= 0 ? "+" : "";
        const pnlSign = pnl >= 0 ? "+" : "";

        const realizedCls = pctClass(realized);
        const realizedSign = realized >= 0 ? "+" : "";
        const realizedRow = myOpts.realized ? `
          <div class="hero-row">
            <span class="hero-label">실현</span>
            <span class="hero-pct">&nbsp;</span>
            <span class="hero-val ${realizedCls}">${realizedSign}${fmtMoney(realized, c)}</span>
          </div>
        ` : "";
        return `
          <div class="hero-block">
            <div class="hero-ccy-label">${escape_(c)}</div>
            <div class="hero-row">
              <span class="hero-label">원금</span>
              <span class="hero-pct">&nbsp;</span>
              <span class="hero-val">${fmtMoney(principal, c)}</span>
            </div>
            <div class="hero-row">
              <span class="hero-label">현재</span>
              <span class="hero-pct">&nbsp;</span>
              <span class="hero-val">${fmtMoney(current, c)}</span>
            </div>
            <div class="hero-row">
              <span class="hero-label">${escape_(pnlLabel)}</span>
              <span class="hero-pct ${cls}">${sign}${pct.toFixed(2)}%</span>
              <span class="hero-val ${cls}">${pnlSign}${fmtMoney(pnl, c)}</span>
            </div>
            ${realizedRow}
          </div>
        `;
      }).join("")}</div>`);
    }
    lastWasHero = true;
  }

  if (myOpts.holdings) {
    if (lastWasHero) sections.push(`<hr class="sec-divider strong"/>`);
    const allHiddenH = holdings.length > 0 && holdings.every(h => h.is_hidden);
    sections.push(_collapsibleHeader("holdings", "보유 종목", allHiddenH));
    if (!collapsed.holdings) {
      if (holdings.length === 0) {
        sections.push(`<div class="empty">보유 종목 없음</div>`);
      } else {
        sections.push(holdings.map(h => {
          const ccy = curOf(h.market, "");
          const evalAmt = h.eval_amount || 0;
          const upct = h.unrealized_pct || 0;
          const cls = pctClass(upct);
          const sign = upct >= 0 ? "+" : "";
          const hidden = h.is_hidden ? "hidden-row" : "";
          return `
            <div class="hrow ${hidden}" data-hide-id="${h.id}">
              <div class="hleft">
                <div class="hname">${escape_(h.ticker_name || h.ticker)}</div>
                <div class="hsub">${escape_(h.ticker)}</div>
              </div>
              <div class="hright">
                <div class="hval">${fmtMoney(evalAmt, ccy)}</div>
                <div class="hpct ${cls}">${sign}${upct.toFixed(2)}%</div>
              </div>
            </div>
          `;
        }).join(""));
      }
    }
    lastWasHero = false;
  }

  if (myOpts.closed) {
    if (lastWasHero) sections.push(`<hr class="sec-divider strong"/>`);
    const allHiddenC = closed.length > 0 && closed.every(h => h.is_hidden);
    sections.push(_collapsibleHeader("closed", "닫힌 포지션", allHiddenC));
    if (!collapsed.closed) {
      if (closed.length === 0) {
        sections.push(`<div class="empty">닫힌 포지션 없음</div>`);
      } else {
        sections.push(closed.map(h => {
          const ccy = h.currency || curOf(h.market, "");
          const realized = h.realized_pnl || 0;
          const cls = pctClass(realized);
          const sign = realized >= 0 ? "+" : "";
          const hidden = h.is_hidden ? "hidden-row" : "";
          return `
            <div class="hrow ${hidden}" data-hide-id="${h.id}">
              <div class="hleft">
                <div class="hname">${escape_(h.ticker_name || h.ticker)}</div>
                <div class="hsub">${escape_(h.ticker)}</div>
              </div>
              <div class="hright">
                <div class="hval ${cls}">${sign}${fmtMoney(realized, ccy)}</div>
                <div class="hpct" style="color:var(--dim)">실현</div>
              </div>
            </div>
          `;
        }).join(""));
      }
    }
  }

  if (sections.length === 0) {
    body.innerHTML = '<div class="empty">표시할 항목 없음<br><span style="font-size:10px">⚙ 에서 옵션 켜기</span></div>';
  } else {
    body.innerHTML = sections.join("");
  }

  attachMyHandlers();
}

async function toggleCollapse(key) {
  collapsed[key] = !collapsed[key];
  await store.set("my_collapse_" + key, collapsed[key]);
  await store.save();
  renderAll();
}

async function toggleHide(id, rowEl) {
  const cfg = await loadCfg();
  if (!cfg.base) return;
  if (rowEl) rowEl.classList.add("busy");
  try {
    const res = await tFetch(`${cfg.base.replace(/\/$/, "")}/api/my/holdings/${id}/toggle-hidden`, {
      method: "POST",
      headers: { "Authorization": "Basic " + btoa(`${cfg.user}:${cfg.pw}`) },
    });
    if (res.ok) {
      // 새 데이터 + 정렬 재적용
      await refresh();
    }
  } catch (e) { console.error(e); }
}

// 이벤트 위임 — body 에 1회 등록, DOM rebuild 와 클릭 race 방지
let _myDelegated = false;
function attachMyHandlers() {
  if (_myDelegated) return;
  _myDelegated = true;
  $("body").addEventListener("click", (e) => {
    // 일괄 토글 버튼이 collapse 헤더 안에 있어 우선순위 높게
    const bulk = e.target.closest("button.bulk-toggle");
    if (bulk) {
      e.stopPropagation();
      const sec = bulk.dataset.bulkSection;
      const hidden = bulk.dataset.bulkHidden === "true";
      bulkHideSection(sec, hidden);
      return;
    }
    const sec = e.target.closest(".sec-title.collapsible");
    if (sec) {
      toggleCollapse(sec.dataset.section);
      return;
    }
    const row = e.target.closest(".hrow[data-hide-id]");
    if (row && !row.classList.contains("busy")) {
      toggleHide(row.dataset.hideId, row);
    }
  });
}

async function bulkHideSection(sec, hidden) {
  const cfg = await loadCfg();
  if (!cfg.base) return;
  const qtyFilter = sec === "closed" ? "closed" : "open";
  try {
    const res = await tFetch(`${cfg.base.replace(/\/$/, "")}/api/my/holdings/bulk-hidden`, {
      method: "POST",
      headers: {
        "Authorization": "Basic " + btoa(`${cfg.user}:${cfg.pw}`),
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ scope: "all", hidden, qty_filter: qtyFilter }),
    });
    if (res.ok) await refresh();
  } catch (e) { console.error(e); }
}

function renderAll() {
  if (mode === "watch") renderWatch((lastData && lastData.watches) || []);
  else renderMy(lastData || {});
}

// ── DnD 순서 변경 ────────────────────────
let dragId = null;
function attachDnD() {
  const rows = document.querySelectorAll(".row");
  rows.forEach(row => {
    row.addEventListener("dragstart", e => {
      dragId = row.dataset.id;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      document.querySelectorAll(".row.drag-over").forEach(r => r.classList.remove("drag-over"));
    });
    row.addEventListener("dragover", e => {
      e.preventDefault();
      if (row.dataset.id !== dragId) row.classList.add("drag-over");
    });
    row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
    row.addEventListener("drop", async e => {
      e.preventDefault();
      row.classList.remove("drag-over");
      const targetId = row.dataset.id;
      if (!dragId || dragId === targetId) return;
      const fromIdx = currentItems.findIndex(x => String(x.id) === String(dragId));
      const toIdx = currentItems.findIndex(x => String(x.id) === String(targetId));
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = currentItems.splice(fromIdx, 1);
      currentItems.splice(toIdx, 0, moved);
      renderWatch(currentItems);
      await reorderOnServer(currentItems.map(x => x.id));
    });
  });
}

async function reorderOnServer(orderIds) {
  const cfg = await loadCfg();
  if (!cfg.base) return;
  try {
    await tFetch(`${cfg.base.replace(/\/$/, "")}/api/my/watch/reorder`, {
      method: "POST",
      headers: {
        "Authorization": "Basic " + btoa(`${cfg.user}:${cfg.pw}`),
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ order: orderIds }),
    });
  } catch (e) { console.error(e); }
}

// ── refresh ────────────────────────
async function refresh() {
  const cfg = await loadCfg();
  if (!cfg.base || !cfg.user) {
    $("status").textContent = "설정필요";
    lastData = { watches: [] };
    renderAll();
    return;
  }
  try {
    const res = await tFetch(`${cfg.base.replace(/\/$/, "")}/api/my/refresh`, {
      method: "GET",
      headers: { "Authorization": "Basic " + btoa(`${cfg.user}:${cfg.pw}`) },
    });
    if (!res.ok) {
      $("status").textContent = `HTTP ${res.status}`;
      return;
    }
    lastData = await res.json();
    renderAll();
    $("status").textContent = new Date().toTimeString().slice(0, 8);
  } catch (e) {
    $("status").textContent = "오류";
    console.error(e);
  }
}

// ── live loop (Date.now 기반 — 백그라운드 throttle 무관) ──
async function liveLoop() {
  if (!liveOn) return;
  await refresh();
  liveNextAt = Date.now() + intervalSec * 1000;
  if (liveTimer) clearInterval(liveTimer);
  liveTimer = setInterval(liveTick, 250);
}

function liveTick() {
  if (!liveOn || editingInterval) {
    $("cd").textContent = editingInterval ? "수정중" : "";
    return;
  }
  const remain = Math.max(0, Math.ceil((liveNextAt - Date.now()) / 1000));
  $("cd").textContent = remain + "s";
  if (Date.now() >= liveNextAt) {
    clearInterval(liveTimer); liveTimer = null;
    liveLoop();
  }
}

function stopLive() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  $("cd").textContent = "";
}

async function setLive(on) {
  liveOn = on;
  updateLiveBtn();
  await saveLiveCfg();
  if (on) liveLoop();
  else stopLive();
}

// ── settings 창 (작고 이쁘게) ──
async function openSettings() {
  const existing = await WebviewWindow.getByLabel("settings");
  if (existing) {
    await existing.show(); await existing.setFocus();
    return;
  }
  new WebviewWindow("settings", {
    url: "settings.html",
    title: "TradeLab 설정",
    width: 360,
    height: 460,
    minWidth: 300,
    minHeight: 360,
    resizable: true,
    alwaysOnTop: true,
    skipTaskbar: true,
    decorations: true,
    transparent: false,
  });
}

// ── 이벤트 ──
$("btn-hide").onclick = () => win.hide();
$("btn-refresh").onclick = () => { refresh(); if (liveOn) liveLoop(); };
$("btn-pin").onclick = async () => {
  pinned = !pinned;
  await win.setAlwaysOnTop(pinned);
  $("btn-pin").classList.toggle("active", pinned);
};
$("btn-settings").onclick = openSettings;

$("btn-open-web").onclick = async () => {
  const cfg = await loadCfg();
  if (!cfg.base) return;
  try { await openUrl(cfg.base); } catch (e) { console.error(e); }
};

async function setMode(m) {
  mode = (m === "my") ? "my" : "watch";
  await store.set("mode", mode);
  await store.save();
  updateModeBtn();
  renderAll();
}
$("mode-watch").onclick = () => setMode("watch");
$("mode-my").onclick = () => setMode("my");

$("live-toggle").onclick = () => setLive(!liveOn);

$("interval").addEventListener("focus", () => {
  editingInterval = true;
  $("cd").textContent = "수정중";
});
$("interval").addEventListener("blur", async () => {
  editingInterval = false;
  const v = Math.max(3, Math.min(300, Number($("interval").value) || 5));
  $("interval").value = v;
  intervalSec = v;
  await saveLiveCfg();
  if (liveOn) liveLoop();
});
$("interval").addEventListener("keydown", e => {
  if (e.key === "Enter") $("interval").blur();
});

// ── compact 자동 (창 너무 작으면 타이틀만) ──
const ro = new ResizeObserver(() => {
  const h = window.innerHeight;
  $("frame").classList.toggle("compact", h < 70);
});
ro.observe(document.body);

// ── settings-saved 이벤트 listen — 설정창에서 저장하면 즉시 반영 ──
listen("settings-saved", async () => {
  await loadCfg();
  if (lastData) renderAll();
}).catch(() => {});

// ── zoom 슬라이더 라이브 미리보기 ──
listen("zoom-changed", (e) => {
  applyZoom(e.payload);
}).catch(() => {});

// ── Ctrl+Shift+Q: 모드 사이클 (관심 ↔ 자산) ──
listen("cycle-mode", () => {
  const next = (mode === "watch") ? "my" : "watch";
  setMode(next);
}).catch(() => {});

// ── 시작 ──
(async () => {
  await loadCfg();
  await refresh();
  if (liveOn) liveLoop();
})();

window.addEventListener("focus", async () => {
  // 설정창에서 옵션 바꾸고 돌아왔을 수 있음 — 옵션 reload + 다시 그리기
  await loadCfg();
  if (lastData) renderAll();
  if (liveOn && Date.now() >= liveNextAt) liveLoop();
});
</script>
