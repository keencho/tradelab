<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>TradeLab 설정</title>
<style>
  :root {
    --bg: #1c1f25;
    --card: #242831;
    --fg: #e8eaed;
    --dim: #9aa0a6;
    --accent: #3a82f7;
    --line: rgba(255,255,255,0.08);
    --ok: #66bb6a;
    --err: #ef5350;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  h2 {
    margin: 0 0 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--dim);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .field input {
    width: 100%;
    padding: 7px 10px;
    background: var(--card);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 12px;
    transition: border-color 0.15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
    background: #2a2f38;
  }
  .row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  button {
    flex: 1;
    padding: 8px 12px;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: filter 0.1s, transform 0.05s;
  }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent); color: white;
  }
  button.primary:hover { filter: brightness(1.1); }
  button.sec {
    background: var(--card); color: var(--dim);
    border: 1px solid var(--line);
  }
  button.sec:hover { background: #2a2f38; color: var(--fg); }
  .msg {
    font-size: 11px;
    min-height: 14px;
    color: var(--dim);
    text-align: center;
    margin-top: 2px;
  }
  .msg.ok { color: var(--ok); }
  .msg.err { color: var(--err); }
  .hint {
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px solid var(--line);
    line-height: 1.5;
  }
  .opt-group {
    display: flex; flex-direction: column; gap: 2px;
    border-top: 1px solid var(--line);
    padding-top: 6px;
  }
  .opt-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .opt-row:hover { background: rgba(255,255,255,0.04); }

  /* 커스텀 체크박스 */
  .opt-row input[type=checkbox] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    background: var(--card);
    cursor: pointer;
    margin: 0;
    flex-shrink: 0;
    position: relative;
    transition: all 0.12s;
  }
  .opt-row input[type=checkbox]:hover {
    border-color: rgba(255,255,255,0.30);
  }
  .opt-row input[type=checkbox]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .opt-row input[type=checkbox]:checked::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 4px;
    height: 8px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .opt-row span {
    font-size: 12px;
    color: var(--fg);
    line-height: 1.3;
  }
</style>
</head>
<body>
  <h2>서버 설정</h2>
  <div class="field">
    <label>서버 URL</label>
    <input id="base" placeholder="https://your-server.com" autocomplete="off" />
  </div>
  <div class="field">
    <label>유저명</label>
    <input id="user" placeholder="admin" autocomplete="off" />
  </div>
  <div class="field">
    <label>비밀번호</label>
    <input id="pw" type="password" autocomplete="off" />
  </div>
  <h2 style="margin-top:6px">위젯 표시 크기</h2>
  <div class="opt-group" style="border-top:none; padding-top:4px; gap:6px">
    <div style="display:flex; align-items:center; gap:10px;">
      <input type="range" id="opt-zoom" min="0.7" max="1.6" step="0.05" style="flex:1; accent-color: var(--accent);">
      <span id="opt-zoom-val" style="font-size:11px; color:var(--dim); width:42px; text-align:right; font-variant-numeric:tabular-nums;">100%</span>
    </div>
  </div>
  <h2 style="margin-top:6px">자산 모드 표시</h2>
  <div class="opt-group">
    <label class="opt-row"><input type="checkbox" id="opt-hero"><span>총 평가/손익 (히어로)</span></label>
    <label class="opt-row"><input type="checkbox" id="opt-total"><span>총 누적 기준 (청산분 원금 포함)</span></label>
    <label class="opt-row"><input type="checkbox" id="opt-realized"><span>누적 실현손익 (히어로에 추가)</span></label>
    <label class="opt-row"><input type="checkbox" id="opt-holdings"><span>보유 종목</span></label>
    <label class="opt-row"><input type="checkbox" id="opt-closed"><span>닫힌 포지션</span></label>
  </div>
  <div class="row">
    <button id="save" class="primary">저장</button>
    <button id="test" class="sec">접속 테스트</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="hint">단축키: 토글 Ctrl+Shift+X · 즉시 숨김 Ctrl+Shift+H</div>

<script type="module">
import { LazyStore } from "https://esm.sh/@tauri-apps/plugin-store@2";
import { fetch as tFetch } from "https://esm.sh/@tauri-apps/plugin-http@2";
import { emit } from "https://esm.sh/@tauri-apps/api@2/event";

const store = new LazyStore("settings.json");
const $ = (id) => document.getElementById(id);

async function loadBool(key, def) {
  const v = await store.get(key);
  return v === undefined || v === null ? def : !!v;
}

(async () => {
  $("base").value = (await store.get("base_url")) || "";
  $("user").value = (await store.get("user")) || "";
  $("pw").value = (await store.get("pw")) || "";
  $("opt-hero").checked = await loadBool("my_show_hero", true);
  $("opt-total").checked = await loadBool("my_total_basis", false);
  $("opt-realized").checked = await loadBool("my_show_realized", false);
  $("opt-holdings").checked = await loadBool("my_show_holdings", true);
  $("opt-closed").checked = await loadBool("my_show_closed", false);

  const z0 = Number(await store.get("widget_zoom")) || 1.0;
  $("opt-zoom").value = z0;
  $("opt-zoom-val").textContent = Math.round(z0 * 100) + "%";
})();

$("opt-zoom").addEventListener("input", async () => {
  const v = Number($("opt-zoom").value);
  $("opt-zoom-val").textContent = Math.round(v * 100) + "%";
  // 위젯에 라이브 미리보기 — 저장 안 해도 즉시 반영
  try { await emit("zoom-changed", v); } catch {}
});

function setMsg(text, kind = "") {
  const el = $("msg");
  el.textContent = text;
  el.className = "msg " + kind;
}

$("save").onclick = async () => {
  await store.set("base_url", $("base").value.trim());
  await store.set("user", $("user").value.trim());
  await store.set("pw", $("pw").value);
  await store.set("my_show_hero", $("opt-hero").checked);
  await store.set("my_total_basis", $("opt-total").checked);
  await store.set("my_show_realized", $("opt-realized").checked);
  await store.set("my_show_holdings", $("opt-holdings").checked);
  await store.set("my_show_closed", $("opt-closed").checked);
  await store.set("widget_zoom", Number($("opt-zoom").value) || 1.0);
  await store.save();
  // 위젯에 즉시 적용 신호
  try { await emit("settings-saved"); } catch {}
  setMsg("저장됨", "ok");
};

$("test").onclick = async () => {
  const base = $("base").value.trim().replace(/\/$/, "");
  const user = $("user").value.trim();
  const pw = $("pw").value;
  if (!base || !user) { setMsg("URL/유저 입력 필요", "err"); return; }
  setMsg("테스트 중...");
  try {
    const res = await tFetch(`${base}/api/my/watch`, {
      method: "GET",
      headers: { "Authorization": "Basic " + btoa(`${user}:${pw}`) },
    });
    if (res.ok) setMsg(`OK (${res.status})`, "ok");
    else setMsg(`실패 ${res.status}`, "err");
  } catch (e) {
    setMsg("연결 실패: " + (e.message || e), "err");
  }
};
</script>
</body>
</html>
