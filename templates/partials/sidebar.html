<!-- 모바일 오버레이 -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="toggleSidebar()"></div>

<aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-surface border-r border-slate-700 flex flex-col z-50 -translate-x-full lg:translate-x-0 transition-transform">
    <!-- 로고 -->
    <div class="h-16 px-6 border-b border-slate-700 flex items-center gap-3">
        <div class="w-9 h-9 bg-sky-500 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 32 32">
                <path d="M5 7h10" stroke-width="3" stroke-linecap="round"/>
                <path d="M10 7v16" stroke-width="3" stroke-linecap="round"/>
                <path d="M18 7v16h9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="text-lg font-bold text-white">TradeLab</span>
        <!-- 모바일 닫기 -->
        <button onclick="toggleSidebar()" class="ml-auto lg:hidden text-slate-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <!-- 네비게이션 -->
    <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/" onclick="closeSidebar()"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if page == 'dashboard' %}bg-sky-500/10 text-sky-400{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            대시보드
        </a>

        <a href="/portfolio" onclick="closeSidebar()"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if page == 'portfolio' %}bg-sky-500/10 text-sky-400{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            포트폴리오
        </a>

        <a href="/research" onclick="closeSidebar()"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if page == 'research' %}bg-sky-500/10 text-sky-400{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            리서치
        </a>

        <a href="/signals" onclick="closeSidebar()"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if page == 'signals' %}bg-sky-500/10 text-sky-400{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            시그널
            <span class="ml-auto bg-amber-500/20 text-amber-400 text-xs px-2 py-0.5 rounded-full">6</span>
        </a>

        <a href="/news" onclick="closeSidebar()"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors
                  {% if page == 'news' %}bg-sky-500/10 text-sky-400{% else %}text-slate-400 hover:text-white hover:bg-slate-700/50{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
            </svg>
            뉴스
        </a>
    </nav>
</aside>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    function closeSidebar() {
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        }
    }
</script>
