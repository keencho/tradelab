<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeLab{% block title_suffix %}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#17171B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TradeLab">

    <!-- Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: {
                        ground: '#17171B',
                        surface: '#212226',
                        elevated: '#2C2D33',
                        muted: '#8B95A1',
                        toss: '#3182F6',
                        profit: '#F04452',
                        loss: '#3182F6',
                        white: '#F2F4F6',
                    },
                    borderRadius: {
                        'card': '16px',
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        body {
            font-variant-numeric: tabular-nums;
            -webkit-text-size-adjust: 100%;
        }
        /* 스크롤바 (데스크탑) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #17171B; }
        ::-webkit-scrollbar-thumb { background: #2C2D33; border-radius: 3px; }
        /* input */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
        input, select, textarea { font-size: 16px !important; }
        /* iOS */
        * { -webkit-tap-highlight-color: transparent; }
        #sidebar-overlay { touch-action: none; }
        /* iOS PWA safe area */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* iOS smooth scroll */
        .scroll-area {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }
    </style>

    {% block head_extra %}{% endblock %}
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js', { scope: '/' });
        }
        (function() {
            var end = parseInt(localStorage.getItem('tl_session_end'));
            if (!end || isNaN(end)) return;
            var remaining = end - Date.now();
            var SEVEN_DAYS = 7 * 24 * 3600 * 1000;
            if (remaining > 0 && remaining < SEVEN_DAYS) {
                fetch('/api/session/reset', { method: 'POST' }).then(function(r) {
                    if (r.ok) {
                        var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
                        var ttl = isPWA ? 30 * 24 * 3600 * 1000 : 24 * 3600 * 1000;
                        localStorage.setItem('tl_session_end', Date.now() + ttl);
                    }
                });
            }
        })();
    </script>
</head>
<body class="bg-ground text-white font-sans">

    {% include "partials/sidebar.html" %}

    <div class="flex flex-col lg:ml-64" style="height: 100dvh;">
        {% include "partials/header.html" %}

        <main class="flex-1 scroll-area p-4 lg:p-6 safe-bottom">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
